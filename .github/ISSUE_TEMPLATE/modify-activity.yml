name: Modify Existing Activity
description: Request to modify details of an existing extracurricular activity
title: "[MODIFY ACTIVITY] "
labels: ["enhancement", "activity-management"]
body:
  - type: markdown
    attributes:
      value: |
        ## Modify Activity Request
        Copilot will update the activity in `src/backend/database.py`. 
        
        **Context:** Activities are in the `initial_activities` dict. Common changes include description, schedule, max_participants, or adding/removing difficulty.
        
        **Limitations:** The activity name (key) is the unique identifier. Changing the name requires removing and re-adding the activity.
        
        **Acceptance Criteria:** The specified changes are reflected on the website after server restart.

  - type: input
    id: activity-name
    attributes:
      label: Activity Name (exact name as shown on website)
      placeholder: e.g., Chess Club
    validations:
      required: true

  - type: textarea
    id: changes
    attributes:
      label: What needs to be changed?
      description: Describe exactly what should be changed and what the new value should be
      placeholder: |
        e.g., Change max_participants from 12 to 20
        e.g., Update description to "..."
        e.g., Add difficulty "Beginner"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for change
      placeholder: Why is this change needed?
