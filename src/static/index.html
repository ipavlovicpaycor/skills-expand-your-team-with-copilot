<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-mascot">
        <img src="https://octodex.github.com/images/original.png" class="mascot-image" alt="School Mascot" />
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <div id="user-controls">
        <button id="dark-mode-toggle" class="icon-button" title="Toggle dark mode">🌙</button>
        <div id="user-status">
          <button id="login-button" class="icon-button">
            <span class="user-icon">👤</span>
            <span>Login</span>
          </button>
          <div id="user-info" class="hidden">
            <span id="display-name"></span>
            <button id="logout-button">Logout</button>
          </div>
        </div>
      </div>
      <div class="header-bg-animation" aria-hidden="true">
        <svg width="100%" height="100%" viewBox="0 0 800 100" preserveAspectRatio="xMidYMid slice">
          <circle class="bg-node" cx="100" cy="50" r="5" fill="rgba(255,255,255,0.3)"/>
          <circle class="bg-node" cx="300" cy="30" r="4" fill="rgba(255,255,255,0.2)"/>
          <circle class="bg-node" cx="500" cy="60" r="6" fill="rgba(255,255,255,0.25)"/>
          <circle class="bg-node" cx="700" cy="40" r="4" fill="rgba(255,255,255,0.2)"/>
          <line class="bg-line" x1="100" y1="50" x2="300" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
          <line class="bg-line" x1="300" y1="30" x2="500" y2="60" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
          <line class="bg-line" x1="500" y1="60" x2="700" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        </svg>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <div class="main-content-layout">
          <!-- Left Sidebar for Filters -->
          <aside class="sidebar-filters">
            <h3>Filter Activities</h3>
            <!-- Search Box -->
            <div class="search-box">
              <input
                type="text"
                id="activity-search"
                placeholder="Search activities..."
              />
              <button id="search-button" aria-label="Search">
                <span class="search-icon">🔍</span>
              </button>
            </div>

            <div class="filter-container">
              <div class="filter-label">Filter by category:</div>
              <div class="category-filters" id="category-filters">
                <button class="category-filter active" data-category="all">
                  All
                </button>
                <button class="category-filter" data-category="sports">
                  Sports
                </button>
                <button class="category-filter" data-category="arts">
                  Arts
                </button>
                <button class="category-filter" data-category="academic">
                  Academic
                </button>
                <button class="category-filter" data-category="community">
                  Community
                </button>
                <button class="category-filter" data-category="technology">
                  Technology
                </button>
              </div>
            </div>

            <!-- Day Filter -->
            <div class="filter-container day-filter-container">
              <div class="filter-label">Filter by day:</div>
              <div class="day-filters" id="day-filters">
                <button class="day-filter active" data-day="">All Days</button>
                <button class="day-filter" data-day="Monday">Monday</button>
                <button class="day-filter" data-day="Tuesday">Tuesday</button>
                <button class="day-filter" data-day="Wednesday">
                  Wednesday
                </button>
                <button class="day-filter" data-day="Thursday">Thursday</button>
                <button class="day-filter" data-day="Friday">Friday</button>
                <button class="day-filter" data-day="Saturday">Saturday</button>
                <button class="day-filter" data-day="Sunday">Sunday</button>
              </div>
            </div>

            <!-- Time Filter -->
            <div class="filter-container time-filter-container">
              <div class="filter-label">Filter by time:</div>
              <div class="time-filters">
                <button class="time-filter active" data-time="">
                  All Times
                </button>
                <button class="time-filter" data-time="morning">
                  Before School
                </button>
                <button class="time-filter" data-time="afternoon">
                  After School
                </button>
                <button class="time-filter" data-time="weekend">Weekend</button>
              </div>
            </div>

            <!-- Difficulty Filter -->
            <div class="filter-container difficulty-filter-container">
              <div class="filter-label">Filter by difficulty:</div>
              <div class="difficulty-filters" id="difficulty-filters">
                <button class="difficulty-filter active" data-difficulty="all">All</button>
                <button class="difficulty-filter" data-difficulty="Beginner">Beginner</button>
                <button class="difficulty-filter" data-difficulty="Intermediate">Intermediate</button>
                <button class="difficulty-filter" data-difficulty="Advanced">Advanced</button>
              </div>
            </div>

            <!-- Display Options -->
            <div class="filter-container">
              <div class="filter-label">Display options:</div>
              <label class="group-by-label">
                <input type="checkbox" id="group-by-category"> Group by category
              </label>
            </div>
          </aside>

          <!-- Activities Content -->
          <div class="activities-content">
            <div class="view-toggle-bar">
              <button class="view-toggle-btn active" id="card-view-btn" data-view="card">📋 Card View</button>
              <button class="view-toggle-btn" id="calendar-view-btn" data-view="calendar">📅 Calendar View</button>
            </div>
            <div id="activities-list">
              <!-- Activities will be loaded here -->
              <p>Loading activities...</p>
            </div>
            <div id="calendar-view" class="hidden"></div>
            <div id="message" class="hidden message"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <!-- Registration Modal -->
    <div id="registration-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Register for <span id="modal-activity-name"></span></h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input
              type="email"
              id="email"
              required
              placeholder="your-email@mergington.edu"
            />
          </div>
          <input type="hidden" id="activity" value="" />
          <button type="submit">Register</button>
        </form>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-login-modal">&times;</span>
        <h3>Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input
              type="text"
              id="username"
              required
              placeholder="Enter your username"
            />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input
              type="password"
              id="password"
              required
              placeholder="Enter your password"
            />
          </div>
          <button type="submit">Login</button>
        </form>
        <div id="login-message" class="hidden message"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
